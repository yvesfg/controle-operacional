<svg viewBox="0 0 340 200" xmlns="http://www.w3.org/2000/svg" font-family="'Bebas Neue','Arial Black',sans-serif">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <\!-- Background -->
  <rect width="340" height="200" fill="#000000"/>

  <\!-- Ambient glow behind truck -->
  <ellipse cx="160" cy="120" rx="130" ry="60" fill="rgba(34,197,94,0.25)" filter="url(#glow2)"/>

  <\!-- ═══ TRUCK BODY ═══ -->
  <\!-- Cab roof (top face, 3D perspective) -->
  <polygon points="45,38 230,32 250,48 60,54" 
    fill="rgba(34,197,94,0.08)" stroke="#22c55e" stroke-width="1.2" filter="url(#glow)"/>

  <\!-- Cab left (main side panel) -->
  <polygon points="45,54 45,148 230,148 230,48"
    fill="rgba(34,197,94,0.04)" stroke="#22c55e" stroke-width="1.2" filter="url(#glow)"/>

  <\!-- Front face (3/4 view) -->
  <polygon points="230,48 250,48 250,148 230,148"
    fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1.2" filter="url(#glow)"/>

  <\!-- Windshield (slanted, low-poly) -->
  <polygon points="60,54 190,48 185,90 55,94"
    fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="1.1" filter="url(#glow)"/>

  <\!-- Windshield divider (A-pillar line) -->
  <line x1="185" y1="90" x2="190" y2="48" stroke="#22c55e" stroke-width="0.8" opacity="0.7"/>

  <\!-- Cab facet lines (low-poly triangles on side panel) -->
  <line x1="45" y1="94" x2="185" y2="90" stroke="#22c55e" stroke-width="0.7" opacity="0.5"/>
  <line x1="55" y1="94" x2="100" y2="148" stroke="#22c55e" stroke-width="0.6" opacity="0.4"/>
  <line x1="185" y1="90" x2="230" y2="110" stroke="#22c55e" stroke-width="0.7" opacity="0.5"/>
  <line x1="45" y1="120" x2="230" y2="116" stroke="#22c55e" stroke-width="0.6" opacity="0.35"/>
  <line x1="100" y1="94" x2="115" y2="148" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
  <line x1="155" y1="92" x2="165" y2="148" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>

  <\!-- Door outline -->
  <rect x="105" y="96" width="100" height="48" rx="1"
    fill="rgba(34,197,94,0.03)" stroke="#22c55e" stroke-width="0.9" filter="url(#glow)"/>

  <\!-- Door handle -->
  <line x1="190" y1="118" x2="200" y2="118" stroke="#22c55e" stroke-width="1.2" opacity="0.8"/>

  <\!-- "G" gold badge on door -->
  <text x="155" y="128" text-anchor="middle" font-size="22" font-weight="900"
    fill="#F3BA2F" filter="url(#glow2)" letter-spacing="0" opacity="0.95">G</text>

  <\!-- Front grille (geometric pattern) -->
  <rect x="231" y="68" width="18" height="70" rx="0"
    fill="rgba(34,197,94,0.05)" stroke="#22c55e" stroke-width="0.8" opacity="0.7"/>
  <\!-- Grille lines -->
  <line x1="231" y1="80" x2="249" y2="80" stroke="#22c55e" stroke-width="0.6" opacity="0.6"/>
  <line x1="231" y1="92" x2="249" y2="92" stroke="#22c55e" stroke-width="0.6" opacity="0.6"/>
  <line x1="231" y1="104" x2="249" y2="104" stroke="#22c55e" stroke-width="0.6" opacity="0.6"/>
  <line x1="231" y1="116" x2="249" y2="116" stroke="#22c55e" stroke-width="0.6" opacity="0.6"/>
  <line x1="231" y1="128" x2="249" y2="128" stroke="#22c55e" stroke-width="0.6" opacity="0.6"/>
  <\!-- Grille vertical center -->
  <line x1="240" y1="68" x2="240" y2="138" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>

  <\!-- Headlights -->
  <rect x="231" y="54" width="18" height="12" rx="1"
    fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="0.8"/>

  <\!-- Front bumper -->
  <rect x="230" y="140" width="22" height="8" rx="1"
    fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="0.9"/>

  <\!-- Step / fuel tank below door -->
  <rect x="105" y="148" width="100" height="10" rx="1"
    fill="rgba(34,197,94,0.08)" stroke="#22c55e" stroke-width="0.7" opacity="0.7"/>

  <\!-- ═══ AXLES & WHEELS ═══ -->
  <\!-- Front axle -->
  <line x1="70" y1="155" x2="70" y2="172" stroke="#22c55e" stroke-width="1.2" filter="url(#glow)"/>
  <\!-- Front wheel outer ring -->
  <circle cx="70" cy="165" r="20" fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="1.4" filter="url(#glow)"/>
  <\!-- Front wheel hub -->
  <circle cx="70" cy="165" r="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
  <\!-- Front wheel spokes -->
  <line x1="70" y1="145" x2="70" y2="185" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  <line x1="50" y1="165" x2="90" y2="165" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  <line x1="56" y1="151" x2="84" y2="179" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
  <line x1="84" y1="151" x2="56" y2="179" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>

  <\!-- Rear axle 1 -->
  <line x1="185" y1="155" x2="185" y2="172" stroke="#22c55e" stroke-width="1.2" filter="url(#glow)"/>
  <circle cx="185" cy="165" r="20" fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="1.4" filter="url(#glow)"/>
  <circle cx="185" cy="165" r="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
  <line x1="185" y1="145" x2="185" y2="185" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  <line x1="165" y1="165" x2="205" y2="165" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  <line x1="171" y1="151" x2="199" y2="179" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
  <line x1="199" y1="151" x2="171" y2="179" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>

  <\!-- Rear axle 2 (slightly behind/overlapping) -->
  <line x1="220" y1="155" x2="220" y2="172" stroke="#22c55e" stroke-width="1.2" filter="url(#glow)"/>
  <circle cx="220" cy="165" r="20" fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="1.4" filter="url(#glow)"/>
  <circle cx="220" cy="165" r="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
  <line x1="220" y1="145" x2="220" y2="185" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="165" x2="240" y2="165" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
  <line x1="206" y1="151" x2="234" y2="179" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
  <line x1="234" y1="151" x2="206" y2="179" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>

  <\!-- Chassis/frame line -->
  <line x1="45" y1="155" x2="255" y2="155" stroke="#22c55e" stroke-width="1" opacity="0.5"/>

  <\!-- ═══ TEXT ═══ -->
  <text x="170" y="198" text-anchor="middle" 
    font-size="26" font-weight="900" letter-spacing="4"
    fill="#F3BA2F" filter="url(#glow2)">YFGroup</text>
</svg>
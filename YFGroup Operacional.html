// ─── SPARKLINE SVG CHART ─────────────────────────────────────────────────────
function LineChart({ values, color="#a78bfa", height=80, showGradient=true }) {
  const w = 520, h = height;
  const max = Math.max(...values), min = Math.min(...values);
  const pad = { left:0, right:0, top:8, bottom:8 };
  const xs = values.map((_, i) => pad.left + (i / (values.length - 1)) * (w - pad.left - pad.right));
  const ys = values.map(v => pad.top + ((max - v) / (max - min || 1)) * (h - pad.top - pad.bottom));
  const path = xs.map((x, i) => `${i === 0 ? "M" : "L"} ${x} ${ys[i]}`).join(" ");
  const area = `${path} L ${xs[xs.length-1]} ${h} L ${xs[0]} ${h} Z`;
  const gradId = `grad_${color.replace(/[^a-z0-9]/gi,'_')}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width:"100%", height }} preserveAspectRatio="none">
      {showGradient && (
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
      )}
      {showGradient && <path d={area} fill={`url(#${gradId})`}/>}
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x, i) => (
        <circle key={i} cx={x} cy={ys[i]} r={i === values.length-1 ? 4 : 0} fill={color}/>
      ))}
    </svg>
  );
}

function DonutChart({ slices, size=120 }) {
  const total = slices.reduce((a,b)=>a+b.value,0);
  let cumulative = 0;
  const r = 44, cx = 60, cy = 60;
  const paths = slices.map(slice => {
    const frac = slice.value / total;
    const startAngle = cumulative * 2 * Math.PI - Math.PI/2;
    cumulative += frac;
    const endAngle = cumulative * 2 * Math.PI - Math.PI/2;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const large = frac > 0.5 ? 1 : 0;
    return { d: `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`, color: slice.color };
  });
  return (
    <svg viewBox="0 0 120 120" width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="var(--card2)"/>
      {paths.map((p,i) => <path key={i} d={p.d} fill={p.color} opacity={0.9}/>)}
      <circle cx={cx} cy={cy} r={28} fill="var(--card)"/>
    </svg>
  );
}

// ─── MINI CHART FOR KPI CARDS ─────────────────────────────────────────────────
function MiniSparkline({ values, color }) {
  const w=80, h=30, max=Math.max(...values), min=Math.min(...values);
  const xs = values.map((_, i) => (i/(values.length-1))*w);
  const ys = values.map(v => h - ((v-min)/(max-min||1))*h);
  const d = xs.map((x,i)=>`${i===0?"M":"L"} ${x} ${ys[i]}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width={80} height={30} style={{opacity:0.8}}>
      <path d={d} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round"/>
    </svg>
  );
}

function KpiCard({ label, value, sub, color, spark, delta }) {
  return (
    <div style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:var_radius(), padding:"18px 20px", display:"flex", flexDirection:"column", gap:4, position:"relative", overflow:"hidden" }}>

        {spark && <MiniSparkline values={spark} color={color}/>}
      </div>
      <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:28, letterSpacing:"-0.04em", color:"var(--text)", lineHeight:1.1 }}>{value}</div>
      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
        <span style={{ fontSize:12, color:"var(--text2)" }}>{sub}</span>
        {delta && <span style={{ fontSize:11, color: delta>0 ? "var(--green)" : "var(--red)", fontFamily:"var(--font-mono)" }}>{delta>0?"+":""}{delta}%</span>}
      </div>
    </div>
  );
}

  const filtered = OCORRENCIAS.filter(o => {
    if (filter !== "todas" && o.status !== filter) return false;
    if (search && !o.motorista.toLowerCase().includes(search.toLowerCase()) && !o.tipo.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const counts = {
    todas: OCORRENCIAS.length,

          { label:"Em Andamento", value:counts.em_andamento, color:"var(--orange)" },
          { label:"Resolvidas", value:counts.resolvida, color:"var(--green)" },
        ].map(s=>(
          <div key={s.label} style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"14px 16px" }}>
            <div style={{ fontSize:10, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:4 }}>{s.label.toUpperCase()}</div>
            <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:26, color:s.color, letterSpacing:"-0.03em" }}>{s.value}</div>

        <div style={{ display:"flex", background:"var(--card)", border:"1px solid var(--border)", borderRadius:7, padding:3, gap:2 }}>
          {[["todas","Todas"],["aberta","Abertas"],["em_andamento","Em Andamento"],["resolvida","Resolvidas"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)}
              style={{ background: filter===v?"var(--accent2)":"none", border: filter===v?"1px solid var(--accent)":"1px solid transparent", color: filter===v?"var(--accent)":"var(--text2)", fontSize:12, padding:"5px 12px", borderRadius:5, cursor:"pointer", fontFamily:"var(--font-body)", transition:"all 0.15s" }}>
              {l} <span style={{ fontSize:10, color:"inherit", opacity:0.7 }}>{counts[v]}</span>
            </button>
          ))}

        <div style={{ flex:1, position:"relative", maxWidth:280 }}>
          <Icon name="search" size={14} color="var(--text3)" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)" }}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar motorista ou tipo..."
            style={{ width:"100%", background:"var(--card)", border:"1px solid var(--border)", borderRadius:7, padding:"8px 10px 8px 32px", color:"var(--text)", fontSize:13, outline:"none" }}
            onFocus={e=>e.target.style.borderColor="var(--accent)"}
            onBlur={e=>e.target.style.borderColor="var(--border)"}/>
        </div>
        <button onClick={()=>setShowModal(true)}
          style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6, background:"var(--accent)", border:"none", borderRadius:7, padding:"8px 16px", color:"#fff", fontSize:13, fontWeight:600, fontFamily:"var(--font-display)", cursor:"pointer" }}>
          <Icon name="plus" size={14} color="#fff"/>
          Nova Ocorrência
        </button>
      </div>

      {/* List */}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {filtered.map(oc=>(
          <div key={oc.id}
            onClick={()=>setSelected(selected?.id===oc.id ? null : oc)}
            style={{ background:"var(--card)", border:`1px solid ${selected?.id===oc.id?"var(--accent)":"var(--border)"}`, borderRadius:"var(--radius)", padding:"16px 20px", cursor:"pointer", transition:"all 0.15s" }}
            onMouseEnter={e=>{ if(selected?.id!==oc.id) e.currentTarget.style.borderColor="var(--border2)"; }}
            onMouseLeave={e=>{ if(selected?.id!==oc.id) e.currentTarget.style.borderColor="var(--border)"; }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:14 }}>
              {/* Gravity dot */}
              <div style={{ width:8, height:8, borderRadius:"50%", background:gravColors[oc.gravidade]?.text, marginTop:5, flexShrink:0 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
                  <span style={{ fontFamily:"var(--font-display)", fontWeight:600, fontSize:14 }}>{oc.tipo}</span>
                  <span style={{ fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)" }}>#{oc.id}</span>
                  <span style={{ marginLeft:"auto", display:"flex", gap:6 }}>
                    <span style={{ fontSize:10, fontFamily:"var(--font-mono)", color:gravColors[oc.gravidade]?.text, background: gravColors[oc.gravidade]?.text+"22", padding:"2px 7px", borderRadius:4 }}>{gravColors[oc.gravidade]?.label}</span>
                    <span style={{ fontSize:10, fontFamily:"var(--font-mono)", color:ocStatus[oc.status]?.text, background: ocStatus[oc.status]?.text+"22", padding:"2px 7px", borderRadius:4 }}>{ocStatus[oc.status]?.label}</span>
                  </span>
                </div>
                <div style={{ fontSize:13, color:"var(--text2)", lineHeight:1.5, marginBottom:6 }}>{oc.descricao}</div>
                <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>
                  <span style={{ fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)" }}>MOTORISTA: <span style={{ color:"var(--text2)" }}>{oc.motorista}</span></span>
                  <span style={{ fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)" }}>VIAGEM: <span style={{ color:"var(--text2)" }}>{oc.viagem}</span></span>
                  <span style={{ fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)" }}>{oc.data}</span>
                </div>
              </div>
            </div>
            {/* Expanded detail */}
            {selected?.id===oc.id && (
              <div style={{ marginTop:16, paddingTop:16, borderTop:"1px solid var(--border)", display:"flex", gap:8, flexWrap:"wrap" }}>
                {[["Encaminhar","var(--accent)"],["Resolver","var(--green)"],["Escalar","var(--red)"]].map(([l,c])=>(
                  <button key={l} onClick={e=>{e.stopPropagation()}}
                    style={{ background: c+"22", border:`1px solid ${c}`, color:c, borderRadius:6, padding:"7px 16px", fontSize:13, fontFamily:"var(--font-display)", fontWeight:500, cursor:"pointer" }}>
                    {l}
                  </button>
                ))}
                <button onClick={e=>{e.stopPropagation(); setSelected(null)}} style={{ marginLeft:"auto", background:"none", border:"none", color:"var(--text3)", cursor:"pointer", display:"flex", alignItems:"center", gap:4, fontSize:13 }}>
                  <Icon name="x" size={13}/> Fechar
                </button>
              </div>
            )}
          </div>
        ))}
        {filtered.length===0 && (
          <div style={{ textAlign:"center", padding:"48px 0", color:"var(--text3)" }}>
            <Icon name="check" size={32} color="var(--green)" style={{margin:"0 auto 12px",display:"block"}}/>
            <div style={{ fontSize:14 }}>Nenhuma ocorrência encontrada</div>
          </div>
        )}
      </div>

      {/* Modal Nova Ocorrência */}
      {showModal && (
        <div onClick={()=>setShowModal(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, backdropFilter:"blur(4px)" }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--card)", border:"1px solid var(--border2)", borderRadius:14, padding:"28px 28px 24px", width:"100%", maxWidth:480, position:"relative" }}>
            <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:18, marginBottom:4 }}>Nova Ocorrência</div>
            <div style={{ fontSize:13, color:"var(--text2)", marginBottom:22 }}>Registre um incidente ou alerta operacional.</div>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <label style={{ display:"block", fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:6 }}>TIPO</label>
                  <select value={form.tipo} onChange={e=>setForm(f=>({...f,tipo:e.target.value}))}
                    style={{ width:"100%", background:"var(--surface)", border:"1px solid var(--border2)", borderRadius:7, padding:"9px 12px", color:"var(--text)", fontSize:13, outline:"none", cursor:"pointer" }}>
                    {["Atraso","Avaria mecânica","Documentação","Acidente","Roubo de carga","Pane elétrica","Outro"].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ display:"block", fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:6 }}>GRAVIDADE</label>
                  <select value={form.gravidade} onChange={e=>setForm(f=>({...f,gravidade:e.target.value}))}
                    style={{ width:"100%", background:"var(--surface)", border:"1px solid var(--border2)", borderRadius:7, padding:"9px 12px", color:"var(--text)", fontSize:13, outline:"none", cursor:"pointer" }}>
                    {[["baixa","Baixa"],["media","Média"],["alta","Alta"],["critica","Crítica"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
              </div>
              <div>
                <label style={{ display:"block", fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:6 }}>MOTORISTA</label>
                <input value={form.motorista} onChange={e=>setForm(f=>({...f,motorista:e.target.value}))} placeholder="Nome do motorista"
                  style={{ width:"100%", background:"var(--surface)", border:"1px solid var(--border2)", borderRadius:7, padding:"9px 12px", color:"var(--text)", fontSize:13, outline:"none" }}
                  onFocus={e=>e.target.style.borderColor="var(--accent)"}
                  onBlur={e=>e.target.style.borderColor="var(--border2)"}/>
              </div>
              <div>
                <label style={{ display:"block", fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:6 }}>DESCRIÇÃO</label>
                <textarea value={form.descricao} onChange={e=>setForm(f=>({...f,descricao:e.target.value}))} placeholder="Descreva a ocorrência em detalhes..." rows={3}
                  style={{ width:"100%", background:"var(--surface)", border:"1px solid var(--border2)", borderRadius:7, padding:"9px 12px", color:"var(--text)", fontSize:13, outline:"none", resize:"vertical" }}
                  onFocus={e=>e.target.style.borderColor="var(--accent)"}
                  onBlur={e=>e.target.style.borderColor="var(--border2)"}/>
              </div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:20 }}>
              <button onClick={()=>setShowModal(false)} style={{ flex:1, background:"none", border:"1px solid var(--border2)", borderRadius:7, padding:"10px", color:"var(--text2)", fontSize:14, fontFamily:"var(--font-display)", cursor:"pointer" }}>Cancelar</button>
              <button onClick={()=>setShowModal(false)} style={{ flex:2, background:"var(--accent)", border:"none", borderRadius:7, padding:"10px", color:"#fff", fontSize:14, fontWeight:600, fontFamily:"var(--font-display)", cursor:"pointer" }}>Registrar Ocorrência</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                    </div>
                    <span style={{ fontSize:11, fontFamily:"var(--font-mono)", color:"var(--text2)" }}>{88+i*2}%</span>
                  </div>
                </td>
                <td style={{ padding:"11px 16px" }}>
                  <span style={{ fontSize:11, fontFamily:"var(--font-mono)", color: i<2?"var(--orange)":"var(--text3)" }}>{i<2?Math.floor(Math.random()*3)+1:0}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── VIAGENS ─────────────────────────────────────────────────────────────────
function Viagens() {

  const [statusFilter, setStatusFilter] = useState("todas");
  const filtered = VIAGENS.filter(v => {
    if (statusFilter !== "todas" && v.status !== statusFilter) return false;
    if (search && !v.motorista.toLowerCase().includes(search.toLowerCase()) && !v.id.toLowerCase().includes(search.toLowerCase())) return false;
    return true;

  return (
    <div style={{ flex:1, overflow:"auto", padding:"24px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        <div style={{ display:"flex", background:"var(--card)", border:"1px solid var(--border)", borderRadius:7, padding:3, gap:2 }}>

            <button key={v} onClick={()=>setStatusFilter(v)}
              style={{ background: statusFilter===v?"var(--accent2)":"none", border: statusFilter===v?"1px solid var(--accent)":"1px solid transparent", color: statusFilter===v?"var(--accent)":"var(--text2)", fontSize:12, padding:"5px 12px", borderRadius:5, cursor:"pointer", fontFamily:"var(--font-body)", transition:"all 0.15s" }}>
              {l}
            </button>
          ))}
        </div>
        <div style={{ position:"relative" }}>
          <Icon name="search" size={14} color="var(--text3)" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)" }}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar DT ou motorista..."
            style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:7, padding:"8px 10px 8px 32px", color:"var(--text)", fontSize:13, outline:"none", width:220 }}
            onFocus={e=>e.target.style.borderColor="var(--accent)"}
            onBlur={e=>e.target.style.borderColor="var(--border)"}/>

        <button onClick={()=>setShowNew(true)} style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6, background:"var(--accent)", border:"none", borderRadius:7, padding:"8px 16px", color:"#fff", fontSize:13, fontWeight:600, fontFamily:"var(--font-display)", cursor:"pointer" }}>
          <Icon name="plus" size={14} color="#fff"/>

            <tr style={{ background:"var(--surface)" }}>
              {["DT","DATA","MOTORISTA","ORIGEM","DESTINO","STATUS","CTE","AÇÕES"].map(h=>(

              ))}

              <tr key={v.id} style={{ borderTop:"1px solid var(--border)", transition:"background 0.1s" }}

                <td style={{ padding:"12px 16px", fontFamily:"var(--font-mono)", fontSize:11, color:"var(--text3)" }}>{v.id}</td>

// ─── TWEAKS PANEL ─────────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const schemes = [
    { id:"violet", label:"Violeta", color:"oklch(0.62 0.22 280)" },
    { id:"cyan", label:"Cyan", color:"oklch(0.68 0.18 200)" },
    { id:"green", label:"Verde", color:"oklch(0.65 0.18 145)" },
    { id:"orange", label:"Laranja", color:"oklch(0.72 0.2 55)" },
  ];
  const applyScheme = (id, hue) => {
    document.documentElement.style.setProperty("--accent", `oklch(0.62 0.22 ${hue})`);
    document.documentElement.style.setProperty("--accent2", `oklch(0.62 0.22 ${hue} / 0.15)`);
    document.documentElement.style.setProperty("--accent-glow", `oklch(0.62 0.22 ${hue} / 0.3)`);
    setTweaks(t=>({...t, colorScheme:id, accentHue:hue}));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{colorScheme:id, accentHue:hue}}, '*');
  };

  return (
    <div style={{ position:"fixed", bottom:20, right:20, background:"var(--card)", border:"1px solid var(--border2)", borderRadius:12, padding:"16px 18px", zIndex:200, width:220, boxShadow:"0 8px 32px rgba(0,0,0,0.5)" }}>
      <div style={{ fontFamily:"var(--font-display)", fontWeight:600, fontSize:14, marginBottom:14 }}>Tweaks</div>

      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:8 }}>COR DE ACENTO</div>
        <div style={{ display:"flex", gap:6 }}>
          {schemes.map(s=>(
            <button key={s.id} onClick={()=>applyScheme(s.id, {violet:280,cyan:200,green:145,orange:55}[s.id])}
              title={s.label}
              style={{ width:28, height:28, borderRadius:"50%", background:s.color, border: tweaks.colorScheme===s.id?"2px solid var(--text)":"2px solid transparent", cursor:"pointer", transition:"border 0.2s" }}/>
          ))}
        </div>
      </div>

      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:8 }}>SIDEBAR</div>
        <button onClick={()=>setTweaks(t=>({...t,sidebarCollapsed:!t.sidebarCollapsed}))}
          style={{ background:tweaks.sidebarCollapsed?"var(--accent2)":"var(--surface)", border:`1px solid ${tweaks.sidebarCollapsed?"var(--accent)":"var(--border)"}`, color:tweaks.sidebarCollapsed?"var(--accent)":"var(--text2)", borderRadius:6, padding:"6px 12px", fontSize:12, fontFamily:"var(--font-body)", cursor:"pointer", width:"100%" }}>
          {tweaks.sidebarCollapsed ? "Expandir sidebar" : "Recolher sidebar"}
        </button>
      </div>

      <div>
        <div style={{ fontSize:11, color:"var(--text3)", fontFamily:"var(--font-mono)", letterSpacing:"0.06em", marginBottom:8 }}>DENSIDADE</div>
        <button onClick={()=>setTweaks(t=>({...t,compactCards:!t.compactCards}))}
          style={{ background:tweaks.compactCards?"var(--accent2)":"var(--surface)", border:`1px solid ${tweaks.compactCards?"var(--accent)":"var(--border)"}`, color:tweaks.compactCards?"var(--accent)":"var(--text2)", borderRadius:6, padding:"6px 12px", fontSize:12, fontFamily:"var(--font-body)", cursor:"pointer", width:"100%" }}>
          {tweaks.compactCards ? "Modo compacto ativado" : "Ativar modo compacto"}
        </button>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(() => {
    try { return localStorage.getItem("yfg_loggedin")==="1"; } catch{return false;}
  });
  const [page, setPage] = useState(() => {
    try { return localStorage.getItem("yfg_page") || "dashboard"; } catch{return "dashboard";}
  });
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  useEffect(() => {
    try { localStorage.setItem("yfg_page", page); } catch{}
  }, [page]);
  useEffect(() => {
    try { if(loggedIn) localStorage.setItem("yfg_loggedin","1"); } catch{}
  }, [loggedIn]);

  // Tweaks listener
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksVisible(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", handler);
  }, []);

  if (!loggedIn) {
    return <LoginScreen onLogin={()=>setLoggedIn(true)}/>;
  }

  const pageTitles = {
    dashboard: ["Dashboard", "ABR/2026 — VISÃO GERAL OPERACIONAL"],
    viagens: ["Viagens", "GERENCIAMENTO DE DTs E CARREGAMENTOS"],
    ocorrencias: ["Ocorrências", "ALERTAS E INCIDENTES ATIVOS"],
    relatorios: ["Relatórios", "KPIs E ANÁLISES DE DESEMPENHO"],
    planilha: ["Planilha", ""],
    diarias: ["Diárias", "PÓS-CARGA"],
    carga_descarga: ["Carga/Descarga", "PÓS-CARGA"],
    operac: ["Operacional", "SGS — CHAMADOS E APONTAMENTOS"],
    motoristas: ["Motoristas", ""],
    admin: ["Administração", ""],
  };
  const [title, subtitle] = pageTitles[page] || ["—",""];

  return (
    <div style={{ display:"flex", height:"100vh", overflow:"hidden" }}>
      <Sidebar page={page} setPage={setPage} collapsed={sidebarCollapsed || tweaks.sidebarCollapsed} setCollapsed={(v)=>setSidebarCollapsed(v)}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>
        <Topbar title={title} subtitle={subtitle} actions={
          <button onClick={()=>setPage("ocorrencias")} style={{ display:"flex", alignItems:"center", gap:6, background:"oklch(0.65 0.22 20 / 0.1)", border:"1px solid oklch(0.65 0.22 20 / 0.3)", borderRadius:7, padding:"7px 12px", color:"var(--red)", fontSize:12, fontFamily:"var(--font-mono)", cursor:"pointer" }}>
            <Icon name="warning" size={13} color="var(--red)"/>
            4 alertas
          </button>
        }/>
        {page === "dashboard" && <Dashboard setPage={setPage}/>}
        {page === "viagens" && <Viagens/>}
        {page === "ocorrencias" && <Ocorrencias/>}
        {page === "relatorios" && <Relatorios/>}
        {page === "diarias" && <DiariasScreen/>}
        {page === "carga_descarga" && <CargaDescargaScreen/>}
        {page === "operac" && <OperacScreen/>}
        {page === "admin" && <AdminScreen/>}
        {!["dashboard","viagens","ocorrencias","relatorios","diarias","carga_descarga","operac","admin"].includes(page) && <PlaceholderPage name={title}/>}
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
